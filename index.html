<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>TMD Macro Generator Ultra</title>

<style>
:root{
  --bg:#070707;
  --panel:#11100f;
  --gold:#d7b985;
  --gold2:#b9955e;
  --white:#f7f7f4;
  --muted:#9b9286;
  --line:rgba(215,185,133,.22);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:radial-gradient(circle at 50% 15%,#1a1712 0%,#050505 48%,#000 100%);
  color:var(--white);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.app{
  display:grid;
  grid-template-columns:380px 1fr;
  min-height:100vh;
}

.controls{
  padding:22px;
  background:rgba(8,8,8,.92);
  border-right:1px solid var(--line);
  overflow:auto;
}

.controls h1{
  font-size:22px;
  margin:0 0 6px;
}

.controls p{
  color:var(--muted);
  margin:0 0 20px;
  line-height:1.35;
}

label{
  display:block;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--gold);
  margin:14px 0 6px;
  font-weight:800;
}

input,select{
  width:100%;
  height:44px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#111;
  color:#fff;
  padding:0 14px;
  font-size:15px;
  outline:none;
}

input:focus,select:focus{
  border-color:var(--gold);
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  width:100%;
  height:48px;
  border:0;
  border-radius:999px;
  margin-top:12px;
  font-weight:900;
  cursor:pointer;
}

.primary{
  background:linear-gradient(135deg,var(--gold),#f1d9a6);
  color:#090909;
}

.secondary{
  background:#171717;
  color:#fff;
  border:1px solid var(--line);
}

.preview-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
}

.phone{
  width:min(420px,92vw);
  aspect-ratio:9/16;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 30px 100px rgba(0,0,0,.65);
  background:#000;
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

@media(max-width:850px){
  .app{
    grid-template-columns:1fr;
  }

  .controls{
    border-right:0;
    border-bottom:1px solid var(--line);
  }
}
</style>
</head>

<body>

<div class="app">

<section class="controls">

<h1>TMD Macro Generator Ultra</h1>
<p>Ultra Premium Animated Macro Overlay</p>

<label>Badge</label>
<input id="badge" value="Recipe" />

<label>Titel</label>
<input id="title" value="FRENCH TOAST" />

<label>Untertitel</label>
<input id="subtitle" value="High Protein Edition" />

<div class="grid2">
<div>
<label>Kcal</label>
<input id="kcal" type="number" value="512" />
</div>

<div>
<label>Portion</label>
<input id="portion" value="Per serving" />
</div>
</div>

<div class="grid2">
<div>
<label>Protein</label>
<input id="protein" type="number" value="42" />
</div>

<div>
<label>Carbs</label>
<input id="carbs" type="number" value="58" />
</div>
</div>

<div class="grid2">
<div>
<label>Fat</label>
<input id="fat" type="number" value="12" />
</div>

<div>
<label>Dauer</label>
<select id="duration">
<option value="2200">2.2 Sekunden</option>
<option value="3000" selected>3 Sekunden</option>
<option value="4000">4 Sekunden</option>
</select>
</div>
</div>

<button class="primary" onclick="downloadPNG()">
Download PNG
</button>

<button class="primary" onclick="downloadVideo()">
Download Video WEBM
</button>

<button class="secondary" onclick="restart()">
Animation neu starten
</button>

</section>

<main class="preview-wrap">

<div class="phone">
<canvas id="canvas" width="1080" height="1920"></canvas>
</div>

</main>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

const $ = id => document.getElementById(id);

let start = performance.now();

function data(){
  return {
    badge:$("badge").value,
    title:$("title").value,
    subtitle:$("subtitle").value,
    kcal:+$("kcal").value,
    portion:$("portion").value,
    protein:+$("protein").value,
    carbs:+$("carbs").value,
    fat:+$("fat").value,
    duration:+$("duration").value
  }
}

function easeOutCubic(t){
  return 1-Math.pow(1-t,3);
}

function easeOutBack(t){
  const c1=1.70158;
  const c3=c1+1;
  return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);
}

function clamp(n,a,b){
  return Math.max(a,Math.min(b,n));
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function fitText(text,x,y,maxWidth,size,weight="900",align="center",color="#fff"){

  ctx.textAlign=align;
  ctx.textBaseline="middle";
  ctx.fillStyle=color;

  let s=size;

  do{
    ctx.font=`${weight} ${s}px Inter, Arial`;
    s-=2;
  }
  while(ctx.measureText(text).width>maxWidth && s>18);

  ctx.fillText(text,x,y);
}

function drawFrame(progress=1, animated=true){

  const d=data();
  const p=animated?progress:1;

  ctx.clearRect(0,0,W,H);

  const bg=ctx.createRadialGradient(W/2,220,20,W/2,H/2,1100);

  bg.addColorStop(0,"#181510");
  bg.addColorStop(.38,"#070707");
  bg.addColorStop(1,"#000");

  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  ctx.save();

  ctx.globalAlpha=.10;
  ctx.translate(W/2,1300);
  ctx.rotate(-0.07);

  ctx.font="900 520px Inter";
  ctx.textAlign="center";
  ctx.fillStyle="#d7b985";

  ctx.fillText("TMD",0,0);

  ctx.restore();

  const glowPulse = .85 + .15*Math.sin(p*Math.PI*2);

  const circleP = easeOutBack(clamp((p-.16)/.45,0,1));
  const fadeTop = easeOutCubic(clamp(p/.35,0,1));
  const boxesP = easeOutBack(clamp((p-.45)/.38,0,1));
  const countP = easeOutCubic(clamp((p-.28)/.58,0,1));

  ctx.save();

  ctx.globalAlpha=fadeTop;

  roundRect(W/2-90,95,180,72,36);

  ctx.fillStyle="#d7b985";
  ctx.shadowColor="rgba(215,185,133,.28)";
  ctx.shadowBlur=28;

  ctx.fill();

  ctx.shadowBlur=0;

  fitText(d.badge,W/2,132,140,30,"900","center","#0a0a0a");

  ctx.restore();

  ctx.save();

  ctx.globalAlpha=fadeTop;

  fitText(
    d.title.toUpperCase(),
    W/2,
    330,
    780,
    78,
    "950"
  );

  fitText(
    d.subtitle,
    W/2,
    420,
    760,
    42,
    "800",
    "center",
    "#b9955e"
  );

  ctx.restore();

  ctx.save();

  ctx.translate(W/2,775);
  ctx.scale(circleP,circleP);

  const cg=ctx.createRadialGradient(0,-80,80,0,0,330);

  cg.addColorStop(0,"#ead3a6");
  cg.addColorStop(1,"#cfad76");

  ctx.beginPath();
  ctx.arc(0,0,285,0,Math.PI*2);

  ctx.fillStyle=cg;

  ctx.shadowColor=`rgba(215,185,133,${.30*glowPulse})`;
  ctx.shadowBlur=70;

  ctx.fill();

  ctx.shadowBlur=0;

  fitText(
    Math.round(d.kcal*countP).toString(),
    0,
    -38,
    430,
    132,
    "950",
    "center",
    "#080808"
  );

  fitText(
    "KCAL",
    0,
    72,
    240,
    38,
    "950",
    "center",
    "#080808"
  );

  fitText(
    d.portion,
    0,
    160,
    360,
    28,
    "650",
    "center",
    "#2b261f"
  );

  ctx.restore();

  function box(x,y,label,value){

    ctx.save();

    ctx.translate(x,y + (1-boxesP)*85);

    ctx.globalAlpha=boxesP;

    roundRect(-155,-58,310,116,58);

    ctx.fillStyle="rgba(18,18,18,.82)";
    ctx.strokeStyle="rgba(215,185,133,.20)";
    ctx.lineWidth=2;

    ctx.shadowColor="rgba(0,0,0,.55)";
    ctx.shadowBlur=30;

    ctx.fill();
    ctx.stroke();

    ctx.shadowBlur=0;

    fitText(
      label,
      0,
      -24,
      210,
      20,
      "900",
      "center",
      "#b9955e"
    );

    fitText(
      `${Math.round(value*countP)} g`,
      0,
      22,
      230,
      44,
      "950"
    );

    ctx.restore();
  }

  box(200,1135,"PROTEIN",d.protein);
  box(540,1135,"CARBS",d.carbs);
  box(880,1135,"FAT",d.fat);

  ctx.save();

  ctx.globalAlpha=.72*fadeTop;

  fitText(
    "@TheMacroDistrict",
    W/2,
    1780,
    620,
    28,
    "700",
    "center",
    "#c9c2b8"
  );

  ctx.restore();
}

function loop(now){

  const d=data();

  const p=((now-start)%d.duration)/d.duration;

  drawFrame(p,true);

  requestAnimationFrame(loop);
}

function restart(){
  start=performance.now();
}

requestAnimationFrame(loop);

function downloadPNG(){

  drawFrame(1,false);

  const a=document.createElement("a");

  a.download="tmd-macro-card.png";

  a.href=canvas.toDataURL("image/png");

  a.click();

  restart();
}

async function downloadVideo(){

  const d=data();

  const fps=60;

  const stream=canvas.captureStream(fps);

  const recorder=new MediaRecorder(stream,{
    mimeType:"video/webm"
  });

  const chunks=[];

  recorder.ondataavailable=e=>{
    if(e.data.size) chunks.push(e.data);
  };

  recorder.onstop=()=>{

    const blob=new Blob(chunks,{
      type:"video/webm"
    });

    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");

    a.href=url;
    a.download="tmd-macro-animation.webm";

    a.click();

    URL.revokeObjectURL(url);

    restart();
  };

  recorder.start();

  const frames=Math.ceil((d.duration/1000)*fps);

  for(let i=0;i<=frames;i++){

    drawFrame(i/frames,true);

    await new Promise(r=>setTimeout(r,1000/fps));
  }

  recorder.stop();
}

</script>

</body>
</html>
