<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TMD Macro Generator Ultra</title>

<style>

:root{
  --gold:#d7b985;
  --goldDark:#b9955e;
  --bg:#050505;
  --line:rgba(215,185,133,.2);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Inter,"Segoe UI",Arial,sans-serif;
}

.app{
  display:grid;
  grid-template-columns:380px 1fr;
  min-height:100vh;
}

.controls{
  background:#0b0b0b;
  border-right:1px solid var(--line);
  padding:24px;
}

.controls h1{
  margin:0 0 10px;
}

label{
  display:block;
  margin:14px 0 6px;
  font-size:12px;
  color:var(--gold);
  text-transform:uppercase;
  font-weight:800;
}

input{
  width:100%;
  height:46px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#111;
  color:#fff;
  padding:0 14px;
  font-size:15px;
  font-family:inherit;
}

input:focus{
  outline:2px solid rgba(215,185,133,.45);
  outline-offset:2px;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  width:100%;
  height:50px;
  border:0;
  border-radius:999px;
  margin-top:14px;
  font-weight:900;
  font-family:inherit;
  cursor:pointer;
}

button:disabled{
  cursor:wait;
  opacity:.62;
}

.primary{
  background:linear-gradient(135deg,var(--gold),#f0d7a3);
  color:#000;
}

.secondary{
  background:#171717;
  color:#fff;
  border:1px solid var(--line);
}

.preview{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}

.phone{
  width:min(420px,92vw);
  aspect-ratio:9/16;
  border-radius:32px;
  overflow:hidden;
  box-shadow:0 30px 100px rgba(0,0,0,.7);
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

@media(max-width:850px){

  .app{
    grid-template-columns:1fr;
  }

  .controls{
    border-right:0;
    border-bottom:1px solid var(--line);
  }

}

</style>
</head>

<body>

<div class="app">

<div class="controls">

<h1>TMD Macro Generator</h1>

<label for="badge">Badge</label>
<input id="badge" value="Recipe">

<label for="title">Titel</label>
<input id="title" value="FRENCH TOAST">

<label for="subtitle">Untertitel</label>
<input id="subtitle" value="High Protein Edition">

<div class="grid2">

<div>
<label for="kcal">KCAL</label>
<input id="kcal" type="number" value="512" min="0">
</div>

<div>
<label for="portion">Portion</label>
<input id="portion" value="Per serving">
</div>

</div>

<div class="grid2">

<div>
<label for="protein">Protein</label>
<input id="protein" type="number" value="42" min="0">
</div>

<div>
<label for="carbs">Carbs</label>
<input id="carbs" type="number" value="58" min="0">
</div>

</div>

<div class="grid2">

<div>
<label for="fat">Fat</label>
<input id="fat" type="number" value="12" min="0">
</div>

<div>
<label for="duration">Animations Dauer (Sekunden)</label>
<input id="duration" type="number" value="3" min="0.5" step="0.5">
</div>

</div>

<button class="primary" id="downloadPng" type="button">
Download PNG
</button>

<button class="primary" id="downloadVideo" type="button">
Download Video
</button>

<button class="secondary" id="restartAnimation" type="button">
Animation Neustarten
</button>

</div>

<div class="preview">

<div class="phone">
<canvas id="canvas" width="1080" height="1920"></canvas>
</div>

</div>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

const $ = id => document.getElementById(id);
const FONT_FAMILY = 'Inter, "Segoe UI", Arial, sans-serif';

const watermark = new Image();
const watermarkReady = new Promise(resolve=>{

  watermark.onload = ()=>resolve();
  watermark.onerror = ()=>resolve();
  watermark.src = "watermark.png";
});

let start = performance.now();
let animationFrameId = null;
let isExporting = false;

function textValue(id,fallback){

  const value = $(id).value.trim();

  return value || fallback;
}

function numberValue(id,fallback,min=0,max=Infinity){

  const value = Number($(id).value);
  const safeValue = Number.isFinite(value) ? value : fallback;

  return clamp(safeValue,min,max);
}

async function waitForAssets(){

  if(document.fonts){

    await document.fonts.ready;
  }

  await watermarkReady;
}

function data(){

  return{

    badge:textValue("badge","Recipe"),
    title:textValue("title","Macro Meal"),
    subtitle:textValue("subtitle","High Protein Edition"),

    kcal:numberValue("kcal",0),
    portion:textValue("portion","Per serving"),

    protein:numberValue("protein",0),
    carbs:numberValue("carbs",0),
    fat:numberValue("fat",0),

    duration:numberValue("duration",3,.5,30) * 1000,
    hold:1500

  };
}

function easeOutCubic(t){
  return 1 - Math.pow(1 - t,3);
}

function easeOutBack(t){

  const c1 = 1.70158;
  const c3 = c1 + 1;

  return 1 + c3 * Math.pow(t - 1,3) + c1 * Math.pow(t - 1,2);
}

function clamp(n,a,b){
  return Math.max(a,Math.min(b,n));
}

function roundRect(x,y,w,h,r){

  ctx.beginPath();

  ctx.moveTo(x+r,y);

  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);

  ctx.closePath();
}

function setFont(weight,size){

  ctx.font = `${weight} ${size}px ${FONT_FAMILY}`;
}

function fitText(text,x,y,maxWidth,size,weight="900",align="center",color="#fff"){

  ctx.textAlign = align;
  ctx.textBaseline = "middle";
  ctx.fillStyle = color;

  let s = size;
  const value = String(text ?? "");

  do{

    setFont(weight,s);
    s -= 2;

  }while(ctx.measureText(value).width > maxWidth && s > 18);

  ctx.fillText(value,x,y);
}

function splitLongWord(word,maxWidth){

  const parts = [];
  let current = "";

  for(const char of word){

    const next = current + char;

    if(current && ctx.measureText(next).width > maxWidth){

      parts.push(current);
      current = char;

    }else{

      current = next;
    }
  }

  if(current){

    parts.push(current);
  }

  return parts;
}

function wrapText(text,maxWidth){

  const words = String(text ?? "").trim().split(/\s+/).filter(Boolean);
  const lines = [];
  let line = "";

  for(const word of words){

    const next = line ? `${line} ${word}` : word;

    if(ctx.measureText(next).width <= maxWidth){

      line = next;

    }else{

      if(line){

        lines.push(line);
      }

      if(ctx.measureText(word).width > maxWidth){

        const parts = splitLongWord(word,maxWidth);
        lines.push(...parts.slice(0,-1));
        line = parts[parts.length-1] || "";

      }else{

        line = word;
      }
    }
  }

  if(line){

    lines.push(line);
  }

  return lines.length ? lines : [""];
}

function truncateText(text,maxWidth){

  const suffix = "...";
  let value = String(text ?? "").trim();

  while(value.length && ctx.measureText(value + suffix).width > maxWidth){

    value = value.slice(0,-1).trimEnd();
  }

  return value ? value + suffix : suffix;
}

function fitTextBlock(text,x,y,maxWidth,size,weight="900",color="#fff",maxLines=2,lineHeight=1.08,minSize=24){

  const value = String(text ?? "").trim();
  let s = size;
  let lines = [value];

  do{

    setFont(weight,s);
    lines = wrapText(value,maxWidth);

    if(lines.length <= maxLines){

      break;
    }

    s -= 2;

  }while(s > minSize);

  if(lines.length > maxLines){

    const visible = lines.slice(0,maxLines);
    visible[maxLines-1] = truncateText(lines.slice(maxLines-1).join(" "),maxWidth);
    lines = visible;
  }

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = color;
  setFont(weight,s);

  const gap = s * lineHeight;
  const startY = y - ((lines.length - 1) * gap) / 2;

  lines.forEach((line,index)=>{

    ctx.fillText(line,x,startY + index * gap);
  });

  return{

    fontSize:s,
    lines:lines.length,
    height:(lines.length - 1) * gap + s

  };
}

function drawFrame(progress=1,animated=true,frameData=data()){

  const d = frameData;
  const p = animated ? progress : 1;

  ctx.clearRect(0,0,W,H);

  const bg = ctx.createRadialGradient(W/2,220,20,W/2,H/2,1200);

  bg.addColorStop(0,"#1b1812");
  bg.addColorStop(.4,"#070707");
  bg.addColorStop(1,"#000");

  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  ctx.save();

  ctx.globalAlpha = .08;

  ctx.translate(W/2,1370);

  ctx.rotate(-0.07 + Math.sin(p*Math.PI*2)*0.01);

  const size = 950;

  if(watermark.complete){

    ctx.drawImage(
      watermark,
      -size/2,
      -size/2,
      size,
      size
    );

  }

  ctx.restore();

  const glowPulse = .85 + .15 * Math.sin(p*Math.PI*2);

  const circleP = easeOutBack(clamp((p-.16)/.45,0,1));
  const fadeTop = easeOutCubic(clamp(p/.35,0,1));

  /* Smoothere Macro Animation */
  const boxesP = easeOutCubic(clamp((p-.52)/.50,0,1));

  const countP = easeOutCubic(clamp((p-.28)/.58,0,1));

  ctx.save();

  ctx.globalAlpha = fadeTop;

  roundRect(W/2-90,95,180,72,36);

  ctx.fillStyle = "#d7b985";

  ctx.shadowColor = "rgba(215,185,133,.3)";
  ctx.shadowBlur = 30;

  ctx.fill();

  ctx.shadowBlur = 0;

  fitText(
    d.badge,
    W/2,
    132,
    140,
    30,
    "900",
    "center",
    "#000"
  );

  ctx.restore();

  ctx.save();

  ctx.globalAlpha = fadeTop;

  const titleBlock = fitTextBlock(
    d.title.toUpperCase(),
    W/2,
    320,
    800,
    82,
    "950",
    "#fff",
    2,
    .95,
    50
  );

  fitTextBlock(
    d.subtitle,
    W/2,
    410 + Math.max(0,titleBlock.lines - 1) * 34,
    760,
    44,
    "800",
    "#cfa55f",
    2,
    1.05,
    28
  );

  ctx.restore();

  ctx.save();

  ctx.translate(W/2,780);

  ctx.scale(circleP,circleP);

  const cg = ctx.createRadialGradient(0,-80,80,0,0,340);

  cg.addColorStop(0,"#f3dfb7");
  cg.addColorStop(1,"#d4b07a");

  ctx.beginPath();

  ctx.arc(0,0,290,0,Math.PI*2);

  ctx.fillStyle = cg;

  ctx.shadowColor = `rgba(215,185,133,${.3*glowPulse})`;
  ctx.shadowBlur = 80;

  ctx.fill();

  ctx.shadowBlur = 0;

  fitText(
    Math.round(d.kcal * countP).toString(),
    0,
    -40,
    450,
    138,
    "950",
    "center",
    "#000"
  );

  fitText(
    "KCAL",
    0,
    75,
    250,
    38,
    "950",
    "center",
    "#000"
  );

  fitText(
    d.portion,
    0,
    165,
    340,
    28,
    "700",
    "center",
    "#3b3227"
  );

  ctx.restore();

  function macroBox(x,y,label,value){

    ctx.save();

    /* Weiter unten starten */
    ctx.translate(x,y + (1-boxesP)*180);

    ctx.globalAlpha = boxesP;

    roundRect(-160,-58,320,116,58);

    ctx.fillStyle = "rgba(18,18,18,.85)";
    ctx.strokeStyle = "rgba(215,185,133,.22)";
    ctx.lineWidth = 2;

    ctx.shadowColor = "rgba(0,0,0,.5)";
    ctx.shadowBlur = 30;

    ctx.fill();
    ctx.stroke();

    ctx.shadowBlur = 0;

    fitText(
      label,
      0,
      -22,
      220,
      20,
      "900",
      "center",
      "#cfa55f"
    );

    fitText(
      `${Math.round(value * countP)} g`,
      0,
      22,
      240,
      46,
      "950"
    );

    ctx.restore();
  }

  /* Mehr Abstand zum Kreis */
  macroBox(200,1230,"PROTEIN",d.protein);
  macroBox(540,1230,"CARBS",d.carbs);
  macroBox(880,1230,"FAT",d.fat);

  /* Ultra Premium Socials */
  const socialP = easeOutCubic(clamp((p-.72)/.28,0,1));
  const iconPulse = .85 + .15 * Math.sin(p * Math.PI * 2);

  ctx.save();

  ctx.globalAlpha = socialP;
  ctx.translate(0,(1-socialP)*55);

  function drawYoutubeIcon(){

    ctx.beginPath();
    ctx.moveTo(-7,-10);
    ctx.lineTo(-7,10);
    ctx.lineTo(11,0);
    ctx.closePath();
    ctx.fill();
  }

  function drawTikTokIcon(){

    ctx.beginPath();
    ctx.moveTo(-3,-14);
    ctx.lineTo(5,-14);
    ctx.lineTo(5,1);
    ctx.bezierCurveTo(5,10,-2,15,-10,13);
    ctx.bezierCurveTo(-18,11,-18,0,-8,-1);
    ctx.bezierCurveTo(-5,-1,-2,0,-1,2);
    ctx.lineTo(-1,-14);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(5,-14);
    ctx.bezierCurveTo(8,-7,12,-4,18,-4);
    ctx.lineTo(18,4);
    ctx.bezierCurveTo(13,4,9,2,5,-2);
    ctx.closePath();
    ctx.fill();
  }

  function drawInstagramIcon(){

    ctx.lineWidth = 3;
    ctx.strokeStyle = "#070707";

    roundRect(-11,-11,22,22,6);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0,0,5,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(7,-7,2.2,0,Math.PI*2);
    ctx.fill();
  }

  function socialIcon(x,y,type,delay=0){

    const localP = easeOutBack(clamp((p - .72 - delay) / .22,0,1));

    ctx.save();

    ctx.translate(x,y + (1-localP)*35);
    ctx.scale(localP,localP);

    ctx.shadowColor = `rgba(215,185,133,${.35*iconPulse})`;
    ctx.shadowBlur = 26;

    ctx.beginPath();
    ctx.arc(0,0,25,0,Math.PI*2);
    ctx.fillStyle = "rgba(215,185,133,.95)";
    ctx.fill();

    ctx.shadowBlur = 0;

    ctx.beginPath();
    ctx.arc(0,0,25,0,Math.PI*2);
    ctx.strokeStyle = "rgba(255,255,255,.22)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "#070707";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    if(type === "youtube"){

      drawYoutubeIcon();
    }

    if(type === "tiktok"){

      drawTikTokIcon();
    }

    if(type === "instagram"){

      drawInstagramIcon();
    }

    ctx.restore();
  }

  socialIcon(W/2 - 95,1735,"youtube",0);
  socialIcon(W/2,1735,"tiktok",.05);
  socialIcon(W/2 + 95,1735,"instagram",.10);

  const handleP = easeOutCubic(clamp((p-.82)/.24,0,1));

  ctx.save();

  ctx.globalAlpha = handleP;
  ctx.translate(0,(1-handleP)*35);

  ctx.shadowColor = "rgba(215,185,133,.18)";
  ctx.shadowBlur = 18;

  fitText(
    "@TheMacroDistrict",
    W/2,
    1812,
    640,
    34,
    "850",
    "center",
    "#f1e6d1"
  );

  ctx.shadowBlur = 0;

  ctx.globalAlpha = handleP * .55;
  ctx.beginPath();
  ctx.moveTo(W/2 - 145,1852);
  ctx.lineTo(W/2 + 145,1852);
  ctx.strokeStyle = "rgba(215,185,133,.55)";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();

  ctx.restore();
}

function progressAt(now,d){

  const total = d.duration + d.hold;
  const elapsed = (now - start) % total;

  return elapsed <= d.duration ? elapsed / d.duration : 1;
}

function loop(now){

  const d = data();

  drawFrame(progressAt(now,d),true,d);

  animationFrameId = requestAnimationFrame(loop);
}

function startLoop(){

  if(animationFrameId === null){

    animationFrameId = requestAnimationFrame(loop);
  }
}

function pauseLoop(){

  if(animationFrameId !== null){

    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
  }
}

function restart(){

  start = performance.now();
  startLoop();
}

function downloadBlob(blob,fileName){

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = fileName;
  a.click();

  setTimeout(()=>URL.revokeObjectURL(url),500);
}

function canvasToBlob(type){

  return new Promise(resolve=>canvas.toBlob(resolve,type));
}

function setExporting(exporting){

  isExporting = exporting;

  $("downloadPng").disabled = exporting;
  $("downloadVideo").disabled = exporting;
  $("restartAnimation").disabled = exporting;
}

function progressFromTime(ms,d){

  return ms <= d.duration ? ms / d.duration : 1;
}

async function downloadPNG(){

  await waitForAssets();

  const d = data();

  pauseLoop();
  drawFrame(1,false,d);

  const blob = await canvasToBlob("image/png");

  if(blob){

    downloadBlob(blob,"tmd-macro-card.png");
  }

  restart();
}

async function downloadVideo(){

  if(isExporting){

    return;
  }

  setExporting(true);
  pauseLoop();

  let stream = null;

  try{

    await waitForAssets();

    const d = data();
    const fps = 60;
    const frameDelay = 1000 / fps;
    const totalDuration = d.duration + d.hold;
    const frames = Math.ceil(totalDuration / frameDelay);

    stream = canvas.captureStream(fps);

    const preferredType = "video/webm;codecs=vp9";
    const fallbackType = "video/webm";
    const mimeType = MediaRecorder.isTypeSupported(preferredType) ? preferredType : fallbackType;
    const recorder = new MediaRecorder(stream,{ mimeType });
    const chunks = [];

    recorder.ondataavailable = e=>{

      if(e.data.size){

        chunks.push(e.data);
      }
    };

    const stopped = new Promise(resolve=>{

      recorder.onstop = resolve;
    });

    recorder.start();

    for(let i=0;i<=frames;i++){

      const currentMs = Math.min(i * frameDelay,totalDuration);

      drawFrame(progressFromTime(currentMs,d),true,d);

      await new Promise(resolve=>setTimeout(resolve,frameDelay));
    }

    recorder.stop();
    await stopped;

    const blob = new Blob(chunks,{ type:mimeType });

    downloadBlob(blob,"tmd-macro-animation.webm");

  }finally{

    if(stream){

      stream.getTracks().forEach(track=>track.stop());
    }

    setExporting(false);
    restart();
  }
}

$("downloadPng").addEventListener("click",downloadPNG);
$("downloadVideo").addEventListener("click",downloadVideo);
$("restartAnimation").addEventListener("click",restart);

startLoop();

</script>
</body>
</html>
